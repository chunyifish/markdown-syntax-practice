<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown 語法練習器</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3EM%3C/text%3E%3C/svg%3E">
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #f6f7f9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      button,
      textarea {
        font: inherit;
      }

      button:focus-visible,
      textarea:focus-visible {
        outline: 3px solid #93c5fd;
        outline-offset: 2px;
      }

      main {
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        line-height: 1.2;
      }

      header p {
        margin-top: 8px;
        color: #526070;
      }

      .progress {
        min-width: 150px;
        text-align: right;
        color: #334155;
      }

      .progress strong {
        display: block;
        font-size: 24px;
      }

      .progress-track {
        width: 150px;
        height: 8px;
        margin-top: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: #dbe3ee;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: #2563eb;
        transition: width 160ms ease;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 16px;
      }

      .lessons,
      .panel {
        min-width: 0;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        background: #ffffff;
      }

      .lessons {
        padding: 12px;
      }

      .lesson-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .lesson-button {
        display: grid;
        grid-template-columns: 18px 1fr;
        gap: 8px;
        width: 100%;
        min-height: 46px;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        background: #ffffff;
        color: #253244;
        padding: 10px;
        text-align: left;
        cursor: pointer;
      }

      .lesson-button[aria-pressed="true"] {
        border-color: #2563eb;
        background: #eff6ff;
      }

      .status-dot {
        width: 18px;
        height: 18px;
        border: 1px solid #a7b1bf;
        border-radius: 50%;
        margin-top: 1px;
      }

      .lesson-button.is-complete .status-dot {
        border-color: #15803d;
        background: #22c55e;
      }

      .lesson-title {
        font-weight: 700;
      }

      .lesson-goal {
        margin-top: 2px;
        color: #5f6d7d;
        font-size: 13px;
        line-height: 1.35;
      }

      .workbench {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 16px;
      }

      .panel {
        display: flex;
        min-height: 560px;
        flex-direction: column;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 58px;
        border-bottom: 1px solid #e4e8ef;
        padding: 12px 14px;
      }

      .panel-head h2 {
        font-size: 18px;
      }

      .lesson-tools {
        display: grid;
        gap: 10px;
        border-bottom: 1px solid #e4e8ef;
        padding: 12px 14px;
        background: #f8fafc;
      }

      .requirements {
        display: grid;
        gap: 8px;
      }

      .requirement {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #475569;
        font-size: 14px;
      }

      .requirement::before {
        content: "";
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
        border: 1px solid #94a3b8;
        border-radius: 50%;
        background: #ffffff;
      }

      .requirement.is-met {
        color: #166534;
      }

      .requirement.is-met::before {
        border-color: #16a34a;
        background:
          linear-gradient(135deg, transparent 0 42%, #ffffff 42% 58%, transparent 58%) 4px 7px / 8px 4px no-repeat,
          #22c55e;
      }

      .editor-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 8px;
        color: #64748b;
        font-size: 13px;
      }

      .hint {
        color: #526070;
        font-size: 14px;
      }

      textarea,
      .preview {
        width: 100%;
        flex: 1;
        min-height: 500px;
        border: 0;
        padding: 16px;
        background: #ffffff;
      }

      textarea {
        resize: none;
        line-height: 1.55;
        outline: none;
      }

      .preview {
        overflow: auto;
        line-height: 1.6;
      }

      .preview > :first-child {
        margin-top: 0;
      }

      .preview h1,
      .preview h2,
      .preview h3 {
        line-height: 1.25;
      }

      .preview code {
        border-radius: 4px;
        background: #eef1f5;
        padding: 2px 5px;
      }

      .preview pre {
        overflow: auto;
        border-radius: 8px;
        background: #202733;
        color: #f8fafc;
        padding: 14px;
      }

      .preview blockquote {
        margin-left: 0;
        border-left: 4px solid #9ca3af;
        padding-left: 12px;
        color: #475569;
      }

      .feedback {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        border-radius: 999px;
        padding: 5px 10px;
        background: #fff7ed;
        color: #9a3412;
        font-size: 14px;
      }

      .feedback.is-complete {
        background: #ecfdf5;
        color: #166534;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .text-button {
        min-height: 32px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #ffffff;
        color: #253244;
        padding: 5px 10px;
        cursor: pointer;
      }

      .text-button:hover {
        border-color: #94a3b8;
        background: #f8fafc;
      }

      .text-button:disabled {
        border-color: #dbe3ee;
        background: #eef2f7;
        color: #94a3b8;
        cursor: not-allowed;
      }

      .text-button.primary {
        border-color: #2563eb;
        background: #2563eb;
        color: #ffffff;
      }

      .text-button.primary:hover {
        border-color: #1d4ed8;
        background: #1d4ed8;
      }

      @media (max-width: 920px) {
        header {
          align-items: start;
          flex-direction: column;
        }

        .progress {
          text-align: left;
        }

        .layout,
        .workbench {
          grid-template-columns: 1fr;
        }

        .panel,
        textarea,
        .preview {
          min-height: 340px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Markdown 語法練習器</h1>
          <p>選一道題目，輸入 Markdown，系統會自動檢查語法並即時預覽。</p>
        </div>
        <div class="progress" aria-live="polite">
          <span>完成進度</span>
          <strong id="progress-count">0 / 0</strong>
          <div class="progress-track" aria-hidden="true">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </div>
      </header>

      <div class="layout">
        <aside class="lessons" aria-labelledby="lesson-list-title">
          <h2 id="lesson-list-title">題目區</h2>
          <div id="lesson-list" class="lesson-list"></div>
        </aside>

        <div class="workbench">
          <section class="panel" aria-labelledby="editor-title">
            <div class="panel-head">
              <div>
                <h2 id="editor-title">Markdown 輸入</h2>
                <p id="lesson-goal" class="hint"></p>
              </div>
              <div class="actions">
                <button id="hint-button" class="text-button" type="button">提示</button>
                <button id="reset-button" class="text-button" type="button">重設</button>
                <button id="clear-progress-button" class="text-button" type="button">清除進度</button>
              </div>
            </div>
            <div class="lesson-tools">
              <div id="requirements" class="requirements" aria-label="本題檢查項目"></div>
              <div class="editor-meta">
                <span id="editor-stats">0 行 / 0 字</span>
                <span id="save-status">尚未儲存</span>
              </div>
            </div>
            <textarea id="editor" spellcheck="false" aria-label="Markdown 輸入區"></textarea>
          </section>

          <section class="panel" aria-labelledby="preview-title">
            <div class="panel-head">
              <h2 id="preview-title">預覽</h2>
              <div class="actions">
                <span id="feedback" class="feedback"></span>
                <button id="next-button" class="text-button primary" type="button">下一題</button>
              </div>
            </div>
            <div id="preview" class="preview" aria-live="polite"></div>
          </section>
        </div>
      </div>
    </main>

    <script type="module">
      import { marked } from "https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.esm.js";

      const storageKey = "markdown-practice-state-v1";

      const lessons = [
        {
          id: "heading",
          title: "二級標題",
          goal: "寫出一個二級標題。",
          starter: "請把這行改成二級標題",
          hint: "二級標題用兩個井字號開頭，例如：## 我的標題",
          checks: [
            {
              label: "使用 ## 開頭",
              test: (value) => /^##\s+\S+/m.test(value)
            },
            {
              label: "標題文字不是空白",
              test: (value) => /^##\s+\S.{1,}/m.test(value)
            }
          ]
        },
        {
          id: "list",
          title: "項目清單",
          goal: "建立至少三個項目的無序清單。",
          starter: "- 第一項\n- 第二項",
          hint: "每個項目前面加上 -，例如：- 練習 Markdown",
          checks: [
            {
              label: "每個項目前面都有 -",
              test: (value) => value.split("\n").some((line) => /^-\s+\S+/.test(line))
            },
            {
              label: "至少三個清單項目",
              test: (value) => value.split("\n").filter((line) => /^-\s+\S+/.test(line)).length >= 3
            }
          ]
        },
        {
          id: "link",
          title: "連結",
          goal: "插入一個可點擊的超連結。",
          starter: "OpenAI：https://openai.com",
          hint: "連結格式是：[顯示文字](https://example.com)",
          checks: [
            {
              label: "使用 [顯示文字](網址) 格式",
              test: (value) => /\[[^\]]+\]\([^)]+\)/.test(value)
            },
            {
              label: "網址以 http 或 https 開頭",
              test: (value) => /\[[^\]]+\]\(https?:\/\/[^)]+\)/.test(value)
            }
          ]
        },
        {
          id: "quote-code",
          title: "引用與程式碼",
          goal: "寫出一段引用，並加入一段行內程式碼。",
          starter: "> 這是一段引用\n\n請加入行內程式碼",
          hint: "引用用 > 開頭；行內程式碼用反引號包住，例如：`code`",
          checks: [
            {
              label: "引用行使用 > 開頭",
              test: (value) => /^>\s+\S+/m.test(value)
            },
            {
              label: "行內程式碼使用反引號包住",
              test: (value) => /`[^`]+`/.test(value)
            }
          ]
        },
        {
          id: "table",
          title: "表格",
          goal: "建立一個 Markdown 表格。",
          starter: "| 語法 | 用途 |\n|---|---|\n| # | 標題 |",
          hint: "表格需要標題列與分隔列，例如：| 欄位 | 欄位 | 下一行放 |---|---|",
          checks: [
            {
              label: "包含表格標題列",
              test: (value) => /\|.+\|/.test(value)
            },
            {
              label: "包含 --- 分隔列",
              test: (value) => /\|[\s:-]+\|[\s|:-]*\|/.test(value)
            },
            {
              label: "至少有一列內容",
              test: (value) => /\|.+\|\s*\n\|[\s:-]+\|[\s|:-]*\|\s*\n\|.+\|/.test(value)
            }
          ]
        }
      ];

      const editor = document.querySelector("#editor");
      const preview = document.querySelector("#preview");
      const lessonList = document.querySelector("#lesson-list");
      const lessonGoal = document.querySelector("#lesson-goal");
      const requirements = document.querySelector("#requirements");
      const feedback = document.querySelector("#feedback");
      const progressCount = document.querySelector("#progress-count");
      const progressBar = document.querySelector("#progress-bar");
      const editorStats = document.querySelector("#editor-stats");
      const saveStatus = document.querySelector("#save-status");
      const hintButton = document.querySelector("#hint-button");
      const resetButton = document.querySelector("#reset-button");
      const clearProgressButton = document.querySelector("#clear-progress-button");
      const nextButton = document.querySelector("#next-button");

      const completedLessons = new Set();
      let activeLesson = lessons[0];
      let drafts = {};

      marked.setOptions({
        breaks: true,
        gfm: true
      });

      function loadState() {
        try {
          const savedState = JSON.parse(localStorage.getItem(storageKey));
          if (!savedState) return;

          drafts = savedState.drafts || {};
          savedState.completed?.forEach((lessonId) => {
            if (lessons.some((lesson) => lesson.id === lessonId)) {
              completedLessons.add(lessonId);
            }
          });
          activeLesson = lessons.find((lesson) => lesson.id === savedState.activeLessonId) || lessons[0];
        } catch {
          localStorage.removeItem(storageKey);
        }
      }

      function saveState() {
        const state = {
          activeLessonId: activeLesson.id,
          completed: [...completedLessons],
          drafts
        };
        localStorage.setItem(storageKey, JSON.stringify(state));
        saveStatus.textContent = "已自動儲存";
      }

      function getCheckResults() {
        return activeLesson.checks.map((check) => ({
          label: check.label,
          isMet: check.test(editor.value)
        }));
      }

      function renderLessonList() {
        lessonList.innerHTML = lessons.map((lesson) => {
          const isActive = lesson.id === activeLesson.id;
          const isComplete = completedLessons.has(lesson.id);
          return `
            <button
              class="lesson-button ${isComplete ? "is-complete" : ""}"
              type="button"
              data-lesson-id="${lesson.id}"
              aria-pressed="${isActive}"
            >
              <span class="status-dot" aria-hidden="true"></span>
              <span>
                <span class="lesson-title">${lesson.title}</span>
                <span class="lesson-goal">${lesson.goal}</span>
              </span>
            </button>
          `;
        }).join("");
      }

      function renderRequirements(results) {
        requirements.innerHTML = results.map((result) => `
          <div class="requirement ${result.isMet ? "is-met" : ""}">
            <span>${result.label}</span>
          </div>
        `).join("");
      }

      function selectLesson(lessonId, shouldFocus = true) {
        activeLesson = lessons.find((lesson) => lesson.id === lessonId) || lessons[0];
        lessonGoal.textContent = activeLesson.goal;
        editor.value = drafts[activeLesson.id] || activeLesson.starter;
        renderLessonList();
        update();
        if (shouldFocus) editor.focus();
      }

      function update() {
        const checkResults = getCheckResults();
        const isComplete = checkResults.every((result) => result.isMet);
        if (isComplete) completedLessons.add(activeLesson.id);

        drafts[activeLesson.id] = editor.value;
        preview.innerHTML = marked.parse(editor.value);
        renderRequirements(checkResults);
        feedback.textContent = isComplete ? "完成" : "尚未符合題目要求";
        feedback.classList.toggle("is-complete", isComplete);
        progressCount.textContent = `${completedLessons.size} / ${lessons.length}`;
        progressBar.style.width = `${(completedLessons.size / lessons.length) * 100}%`;
        editorStats.textContent = `${editor.value.split("\n").length} 行 / ${editor.value.length} 字`;
        nextButton.disabled = !isComplete;
        nextButton.textContent = completedLessons.size === lessons.length ? "全部完成" : "下一題";
        renderLessonList();
        saveState();
      }

      lessonList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-lesson-id]");
        if (!button) return;
        selectLesson(button.dataset.lessonId);
      });

      hintButton.addEventListener("click", () => {
        feedback.textContent = activeLesson.hint;
        feedback.classList.remove("is-complete");
      });

      resetButton.addEventListener("click", () => {
        editor.value = activeLesson.starter;
        update();
        editor.focus();
      });

      clearProgressButton.addEventListener("click", () => {
        if (!confirm("確定要清除所有完成紀錄與草稿嗎？")) return;
        completedLessons.clear();
        drafts = {};
        localStorage.removeItem(storageKey);
        selectLesson(lessons[0].id);
      });

      nextButton.addEventListener("click", () => {
        const currentIndex = lessons.findIndex((lesson) => lesson.id === activeLesson.id);
        const nextLesson = lessons[(currentIndex + 1) % lessons.length];
        selectLesson(nextLesson.id);
      });

      editor.addEventListener("input", update);
      loadState();
      selectLesson(activeLesson.id, false);
    </script>
  </body>
</html>
