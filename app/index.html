<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>markdown語法練習器</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #f7f8fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #4c5967;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      section {
        min-width: 0;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      textarea,
      .preview {
        width: 100%;
        min-height: 420px;
        border: 1px solid #d7dde5;
        border-radius: 8px;
        background: #ffffff;
        padding: 16px;
        font: inherit;
      }

      textarea {
        resize: vertical;
        line-height: 1.55;
      }

      .preview {
        overflow: auto;
      }

      .preview h1,
      .preview h2,
      .preview h3 {
        margin-top: 0;
      }

      .preview code {
        border-radius: 4px;
        background: #eef1f5;
        padding: 2px 4px;
      }

      .preview pre {
        overflow: auto;
        border-radius: 8px;
        background: #202733;
        color: #f7f8fa;
        padding: 14px;
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 24px, 1120px);
          padding: 24px 0;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        textarea,
        .preview {
          min-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>markdown語法練習器</h1>
        <p>輸入 Markdown，查看基礎預覽。後續會加入練習題與提示流程。</p>
      </header>

      <div class="workspace">
        <section aria-labelledby="editor-title">
          <h2 id="editor-title">Markdown</h2>
          <textarea id="editor" spellcheck="false"># Markdown 練習

請試著輸入：

- **粗體**
- [連結](https://example.com)
- `行內程式碼`

> 這是一段引用。</textarea>
        </section>

        <section aria-labelledby="preview-title">
          <h2 id="preview-title">預覽</h2>
          <div id="preview" class="preview" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <script>
      const editor = document.querySelector("#editor");
      const preview = document.querySelector("#preview");

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderMarkdown(markdown) {
        const lines = escapeHtml(markdown).split("\n");
        let inList = false;

        const html = lines.map((line) => {
          if (line.startsWith("### ")) return `<h3>${line.slice(4)}</h3>`;
          if (line.startsWith("## ")) return `<h2>${line.slice(3)}</h2>`;
          if (line.startsWith("# ")) return `<h1>${line.slice(2)}</h1>`;
          if (line.startsWith("> ")) return `<blockquote>${line.slice(2)}</blockquote>`;

          const listMatch = line.match(/^- (.+)$/);
          if (listMatch) {
            const item = `<li>${formatInline(listMatch[1])}</li>`;
            if (!inList) {
              inList = true;
              return `<ul>${item}`;
            }
            return item;
          }

          if (inList) {
            inList = false;
            return `</ul>${line ? `<p>${formatInline(line)}</p>` : ""}`;
          }

          return line ? `<p>${formatInline(line)}</p>` : "";
        });

        if (inList) html.push("</ul>");
        return html.join("");
      }

      function formatInline(value) {
        return value
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/`(.+?)`/g, "<code>$1</code>")
          .replace(/\[(.+?)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
      }

      function updatePreview() {
        preview.innerHTML = renderMarkdown(editor.value);
      }

      editor.addEventListener("input", updatePreview);
      updatePreview();
    </script>
  </body>
</html>
